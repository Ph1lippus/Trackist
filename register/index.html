<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Cherry+Cream+Soda&display=swap" rel="stylesheet">

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRACKIST</title>
    <meta name="description" content="TRACKIST">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Cherry+Cream+Soda&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">TRACKIST</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="Login/">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="Register/">Register</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="main">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="auth-card">
                        <h2 class="auth-title">Create Account</h2>
                        <form id="registerForm" novalidate>
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" placeholder="Choose a username" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" placeholder="Min. 6 characters" required minlength="6">
                            </div>
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">Confirm Password</label>
                                <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm your password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Create Account</button>
                        </form>
                        <p class="auth-text mt-3">
                            Already have an account? <a href="/login" class="auth-link">Login</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>


    

    <footer class="footer">
        <div class="container">
            <div class="footer__top">
                <span class="footer__brand">Trackist</span>
                <button id="backToTop" class="footer__back-btn" aria-label="Back to top">
                    <i class="fas fa-chevron-up"></i>
                </button>
            </div>

            <div class="footer__links">
                <div class="footer__links-group">
                    <span class="footer__links-title">Pages</span>
                    <a href="/">Home</a>
                    <a href="/login">Login</a>
                    <a href="/register">Register</a>
                </div>
                <div class="footer__links-group">
                    <span class="footer__links-title">About</span>
                    <a href="#">About Trackist</a>
                    <a href="#">Contact</a>
                </div>
                <div class="footer__links-group">
                    <span class="footer__links-title">Legal</span>
                    <a href="#">Privacy Policy</a>
                    <a href="#">Terms of Service</a>
                </div>
                <div class="footer__links-group">
                    <span class="footer__links-title">Connect</span>
                    <div class="footer__social">
                        <a href="https://github.com/Ph1lippus" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
                        <a href="https://linkedin.com/in/your-profile" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
                        <a href="https://buymeacoffee.com/ph1lippus" target="_blank" aria-label="Buy Me a Coffee"><i class="fas fa-mug-hot"></i></a>
                    </div>
                </div>
            </div>

            <div class="footer__bottom">
                <p class="footer__copyright">
                    &copy; 2026 <strong>Trackist</strong>. Open source. 
                    Built with ❤️ by <a href="https://github.com/Ph1lippus" target="_blank">Ph1lippus</a>
                </p>    
            </div>
        </div>
    </footer>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts.js"></script>
</body>
</html>
